name: Production Deployment

on:
  # 1. Run CI checks on every push to main (Feedback loop)
  push:
    branches: ["main", "develop"]

  # 2. Manual Trigger for Deployment (The "Click")
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "yes" to confirm deployment to VM'
        required: true
        default: 'no'

# 🔐 PERMISOS PARA GITHUB_TOKEN (OBLIGATORIO)
permissions:
  contents: read

jobs:
  # JOB 1: CI Check (Builds Code)
  # Runs on every push AND every deployment attempt.
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Verify SDK Build
        run: pnpm build:sdk

  # JOB 2: Deploy to VM
  # ONLY runs if you clicked the button AND typed "yes"
  deploy:
    needs: ci-check
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deployment == 'yes' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script_stop: true
          script: |
            # --- CONFIGURATION ---
            PROJECT_DIR="/home/chatwoot/chatwoot"
            BACKUP_DIR="$PROJECT_DIR/backups"

            cd $PROJECT_DIR

            # --- STEP 1: DATABASE BACKUP ---
            echo "Starting Database Backup..."
            mkdir -p $BACKUP_DIR

            export $(grep -v '^#' .env | xargs)

            FILE="backup_$(date +%Y%m%d_%H%M%S).sql"
            PGPASSWORD=$POSTGRES_PASSWORD pg_dump \
              -h ${POSTGRES_HOST:-127.0.0.1} \
              -p ${POSTGRES_PORT:-5432} \
              -U ${POSTGRES_USERNAME:-chatwoot} \
              ${POSTGRES_DATABASE:-chatwoot_production} > $BACKUP_DIR/$FILE

            echo "Backup saved: $FILE"
            find $BACKUP_DIR -name "backup_*.sql" -mtime +7 -delete

            # --- STEP 2: UPDATE CODE ---
            echo "Pulling latest code from jabvox..."
            git remote set-url origin git@github.com:Tecnologias-LAN/jabvox.git
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # --- STEP 3: INSTALL DEPENDENCIES ---
            echo "Installing dependencies..."
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
            eval "$(rbenv init -)"
            bundle install
            pnpm install --frozen-lockfile

            # --- STEP 4: MIGRATIONS & ASSETS ---
            echo "Running DB migrations and assets precompile..."
            DISABLE_DATABASE_ENVIRONMENT_CHECK=1 RAILS_ENV=production bundle exec rake db:migrate
            RAILS_ENV=production bundle exec rake assets:precompile

            # --- STEP 5: RESTART APPLICATION ---
            echo "Restarting services..."
            sudo systemctl restart chatwoot-web.1.service chatwoot-worker.1.service

            echo "🚀 Deployment Complete!"
