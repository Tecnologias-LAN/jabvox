name: Production Deployment

on:
  # 1. Run CI checks on every push to main (Feedback loop)
  push:
    branches: ["main", "develop"]

  # 2. Manual Trigger for Deployment (The "Click")
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "yes" to confirm deployment to VM'
        required: true
        default: 'no'

# 🔐 PERMISOS PARA GITHUB_TOKEN (OBLIGATORIO)
permissions:
  contents: read

jobs:
  # JOB 1: CI Check (Builds Code)
  # Runs on every push AND every deployment attempt.
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      # Build Backend
      - name: Verify Backend Builds
        run: pnpm build --filter=backend

      # Build Frontend (with dummy env vars just for the build check)
      - name: Verify Frontend Builds
        run: pnpm build --filter=frontend
        env:
          VITE_API_URL: "http://check"
          VITE_WS_URL: "ws://check"

  # JOB 2: Deploy to VM
  # ONLY runs if you clicked the button AND typed "yes"
  deploy:
    needs: ci-check
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deployment == 'yes' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script_stop: true
          script: |
            # --- CONFIGURATION ---
            PROJECT_DIR="/var/www/crm"
            BACKUP_DIR="$PROJECT_DIR/backups"

            cd $PROJECT_DIR

            # --- STEP 1: DATABASE BACKUP ---
            echo "Starting Database Backup..."
            mkdir -p $BACKUP_DIR

            export $(grep -v '^#' .env | xargs)

            FILE="backup_$(date +%Y%m%d_%H%M%S).sql"
            docker compose exec -T -e PGPASSWORD=$POSTGRES_PASSWORD db \
              pg_dump -U $POSTGRES_USER $POSTGRES_DB > $BACKUP_DIR/$FILE

            echo "Backup saved: $FILE"
            find $BACKUP_DIR -name "backup_*.sql" -mtime +7 -delete

            # --- STEP 2: UPDATE CODE ---
            echo "Pulling latest code from jabvox..."
            git remote set-url origin git@github.com:Tecnologias-LAN/jabvox.git
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # --- STEP 3: RESTART APPLICATION ---
            echo "Restarting Containers..."
            docker compose down
            docker compose up -d --build

            # --- STEP 4: MIGRATIONS ---
            echo "Waiting 20s for NestJS to initialize..."
            sleep 20

            echo "Running Common (Global) Database Migrations..."
            docker compose exec -T api \
              node apps/backend/dist/core/database/migrations/migrate-common.js

            echo "Running Tenant Migrations..."
            docker compose exec -T api \
              node apps/backend/dist/core/database/migrations/migrate-all-tenants.js

            # --- STEP 5: SEEDING ---
            echo "Running Tenant Data Seeding (Idempotent)..."
            docker compose exec -T api \
              node apps/backend/dist/core/database/seeds/seed-all-tenants.js

            echo "🚀 Deployment Complete!"
